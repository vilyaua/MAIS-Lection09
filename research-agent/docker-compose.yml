services:
  search-mcp:
    image: multi-agent-mcp-acp:latest
    build: .
    env_file:
      - .env
    ports:
      - "8901:8901"
    volumes:
      - ./data:/app/data
      - ./index:/app/index
      - ./logs:/app/logs
    entrypoint: ["python", "mcp_servers/search_mcp.py"]

  report-mcp:
    image: multi-agent-mcp-acp:latest
    build: .
    env_file:
      - .env
    ports:
      - "8902:8902"
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    entrypoint: ["python", "mcp_servers/report_mcp.py"]

  acp:
    image: multi-agent-mcp-acp:latest
    build: .
    env_file:
      - .env
    environment:
      - SEARCH_MCP_HOST=search-mcp
    ports:
      - "8903:8903"
    volumes:
      - ./data:/app/data
      - ./index:/app/index
      - ./logs:/app/logs
    entrypoint: ["python", "acp_server.py"]
    depends_on:
      - search-mcp

  # A2A server — Google's Agent-to-Agent protocol (successor to ACP)
  # Use with: AGENT_PROTOCOL=a2a
  a2a:
    image: multi-agent-mcp-acp:latest
    build: .
    env_file:
      - .env
    environment:
      - SEARCH_MCP_HOST=search-mcp
      - A2A_HOST=a2a
    ports:
      - "8904:8904"
    volumes:
      - ./data:/app/data
      - ./index:/app/index
      - ./logs:/app/logs
    entrypoint: ["python", "a2a_server.py"]
    depends_on:
      - search-mcp
    profiles: ["a2a"]

  # Web UI — set AGENT_PROTOCOL=a2a in .env to use A2A instead of ACP
  web:
    image: multi-agent-mcp-acp:latest
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SEARCH_MCP_HOST=search-mcp
      - REPORT_MCP_HOST=report-mcp
      - ACP_HOST=acp
      - A2A_HOST=a2a
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    entrypoint: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - search-mcp
      - report-mcp

  # Interactive CLI — run with: docker compose --profile cli run --rm supervisor
  supervisor:
    image: multi-agent-mcp-acp:latest
    build: .
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      - SEARCH_MCP_HOST=search-mcp
      - REPORT_MCP_HOST=report-mcp
      - ACP_HOST=acp
      - A2A_HOST=a2a
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    entrypoint: ["python", "main.py"]
    depends_on:
      - search-mcp
      - report-mcp
      - acp
    profiles: ["cli"]

  # One-off ingestion
  ingest:
    image: multi-agent-mcp-acp:latest
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./index:/app/index
    entrypoint: ["python", "ingest.py"]
    profiles: ["tools"]
